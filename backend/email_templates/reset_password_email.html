<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #041626;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      border="0"
      style="
        background: linear-gradient(145deg, #041626 0%, #072f46 48%, #0b4c6c 100%);
        padding: 28px 16px;
      "
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            border="0"
            style="
              max-width: 560px;
              border-radius: 28px;
              border: 1px solid rgba(255, 255, 255, 0.55);
              background: linear-gradient(180deg, #1c537a 0%, #174261 52%, #112f45 100%);
              box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
              color: #ffffff;
            "
          >
            <tr>
              <td style="padding: 40px 34px 18px 34px; text-align: center">
                <p
                  style="
                    margin: 0 0 12px 0;
                    font-size: 12px;
                    letter-spacing: 0.34em;
                    font-weight: 700;
                    text-transform: uppercase;
                    color: rgba(255, 255, 255, 0.85);
                  "
                >
                  Astro
                </p>
                <h1
                  style="
                    margin: 0;
                    font-size: 28px;
                    line-height: 1.2;
                    letter-spacing: 0.2em;
                    font-weight: 400;
                    text-transform: uppercase;
                    color: #ffffff;
                  "
                >
                  Reset Password
                </h1>
              </td>
            </tr>

            <tr>
              <td style="padding: 0 34px 10px 34px; text-align: center">
                <p
                  style="
                    margin: 0;
                    font-size: 15px;
                    line-height: 1.7;
                    color: rgba(255, 255, 255, 0.9);
                  "
                >
                  We received a request to reset your password. Click the button below to continue.
                </p>
              </td>
            </tr>

            <tr>
              <td align="center" style="padding: 20px 34px 14px 34px">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td
                      style="
                        border-radius: 18px;
                        border: 1px solid #9ed0ff;
                        background: linear-gradient(145deg, #133045 0%, #05090f 55%, #010305 100%);
                        box-shadow: 0 16px 34px rgba(0, 0, 0, 0.5);
                      "
                    >
                      <a
                        href="{{ .ConfirmationURL }}"
                        style="
                          display: inline-block;
                          padding: 14px 28px;
                          font-size: 15px;
                          font-weight: 700;
                          letter-spacing: 0.04em;
                          color: #ffffff;
                          text-decoration: none;
                        "
                      >
                        Reset Password
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td style="padding: 0 34px 14px 34px; text-align: center">
                <p style="margin: 0; font-size: 12px; line-height: 1.7; color: rgba(255, 255, 255, 0.72)">
                  If you did not request this, you can safely ignore this email.
                </p>
              </td>
            </tr>

            <tr>
              <td style="padding: 0 34px 34px 34px; text-align: center">
                <p style="margin: 0 0 8px 0; font-size: 12px; color: rgba(255, 255, 255, 0.72)">
                  Button not working? Copy and paste this URL:
                </p>
                <p
                  style="
                    margin: 0;
                    font-size: 11px;
                    line-height: 1.6;
                    color: rgba(158, 208, 255, 0.95);
                    word-break: break-all;
                  "
                >
                  <a
                    href="{{ .ConfirmationURL }}"
                    style="
                      color: rgba(158, 208, 255, 0.95);
                      text-decoration: underline;
                    "
                  >
                    {{ .ConfirmationURL }}
                  </a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
